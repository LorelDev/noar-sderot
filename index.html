<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d13">
<title>נוער שדרות · נושאים</title>
<meta name="description" content="נוער שדרות — פותחים נושא, מצביעים, מגיבים ומתייעצים.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- רשימת נושאים -->
  <section class="view" id="view-list">
    <header class="topbar">
      <div>
        <h1>נוער שדרות</h1>
        <p class="sub">נושאים שנוער פתח · מצביעים ומגיבים</p>
      </div>
      <div class="auth-area" id="authArea"></div>
    </header>

    <div class="sort-row">
      <button class="sort active" data-sort="top">הכי מוצבעים</button>
      <button class="sort" data-sort="new">חדשים</button>
      <button class="btn-new" id="newBtn">נושא חדש</button>
    </div>

    <div id="topicList"></div>
  </section>

  <!-- נושא בודד -->
  <section class="view" id="view-topic" hidden>
    <header class="topbar">
      <button class="btn-back" id="backBtn">חזרה</button>
    </header>
    <div id="topicDetail"></div>

    <div class="comments-head" id="commentsHead"></div>
    <div id="commentList"></div>
    <form class="comment-form" id="commentForm">
      <input type="text" id="commentInput" placeholder="כתבו תגובה..." maxlength="300" autocomplete="off">
      <button type="submit" class="btn-send">שליחה</button>
    </form>

    <!-- היועץ -->
    <div class="advisor">
      <div class="advisor-head">
        <div class="advisor-badge">AI</div>
        <div>
          <b>היועץ</b>
          <p>שאלו כל דבר על הרעיון. היועץ מכיר את כל התגובות וההתייעצויות שהיו כאן.</p>
        </div>
      </div>
      <div class="chat-thread" id="chatThread"></div>
      <form class="comment-form advisor-form" id="chatForm">
        <input type="text" id="chatInput" placeholder="למשל: איך פונים לעירייה עם זה?" maxlength="400" autocomplete="off">
        <button type="submit" class="btn-send">שאלה</button>
      </form>
    </div>
  </section>

  <!-- נושא חדש -->
  <div class="backdrop" id="backdrop" hidden></div>
  <div class="sheet" id="newSheet" hidden>
    <h2>נושא חדש</h2>
    <form id="newForm">
      <input type="text" id="newTitle" placeholder="מה הנושא? משפט אחד" maxlength="80" required>
      <textarea id="newBody" rows="3" placeholder="כמה מילים על הרעיון או הבעיה (לא חובה)" maxlength="400"></textarea>
      <button type="submit" class="btn-primary">פרסום</button>
    </form>
  </div>

  <div class="toast" id="toast" hidden></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="store.js"></script>
<script src="app.js"></script>
</body>
</html>
